name: QA Portfolio CI

# Runs the automated suites against public demo targets
# (saucedemo.com, automationexercise.com API, dummyjson.com).
# Note: jobs depend on live third-party demo services, so an occasional red run
# can be an upstream availability blip rather than a real regression.
# appium-mobile/ is intentionally NOT in CI — it needs an Android emulator or
# BrowserStack credentials (see appium-mobile/README.md).

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  api-newman:
    name: API — Newman (Postman)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-postman-newman
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      # The target is a public third-party demo API that occasionally has brief
      # outages; retry so a transient upstream blip doesn't fail the pipeline.
      - name: Run tests (retry on transient upstream failure)
        run: |
          for attempt in 1 2 3; do
            npm test && exit 0
            echo "::warning::Attempt $attempt failed (likely a transient upstream blip); retrying in 15s"
            sleep 15
          done
          exit 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: api-postman-newman/newman/
          if-no-files-found: ignore

  api-mocha:
    name: API — Mocha + axios
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-mocha
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run tests (retry on transient upstream failure)
        run: |
          for attempt in 1 2 3; do
            npm test && exit 0
            echo "::warning::Attempt $attempt failed (likely a transient upstream blip); retrying in 15s"
            sleep 15
          done
          exit 1

  playwright:
    name: UI — Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright/playwright-report/
          if-no-files-found: ignore

  cypress:
    name: UI — Cypress
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cypress
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  cucumber:
    name: BDD — Cucumber
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cucumber-bdd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: cucumber-bdd/reports/
          if-no-files-found: ignore

  selenium:
    name: UI — Selenium + Mocha
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: selenium-mocha
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - run: npm install
      - run: npm test

  mobile-web:
    name: Mobile — Playwright emulation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-web-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium webkit
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-web-report
          path: mobile-web-playwright/playwright-report/
          if-no-files-found: ignore

  accessibility:
    name: Accessibility — axe-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: accessibility
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accessibility-report
          path: accessibility/playwright-report/
          if-no-files-found: ignore

  email:
    name: Email — SMTP (Mailpit) + HTML validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: email-testing
    services:
      mailpit:
        image: axllent/mailpit
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  security:
    name: Security — headers + access control
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  test-data:
    name: Test data — faker factories
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  api-graphql:
    name: API — GraphQL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-graphql
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run tests (retry on transient upstream failure)
        run: |
          for attempt in 1 2 3; do
            npm test && exit 0
            echo "::warning::Attempt $attempt failed (likely a transient upstream blip); retrying in 15s"
            sleep 15
          done
          exit 1
